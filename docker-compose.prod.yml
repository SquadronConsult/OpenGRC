# Production-style minimal self-hosting (TLS should be added via reverse proxy)
services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_TYPE: sqlite
      SQLITE_PATH: /app/local-data/grc.sqlite
      EVIDENCE_DIR: /app/evidence
      LOCAL_DATA_DIR: /app/local-data
      DB_SYNC: "${DB_SYNC:-true}"
      JWT_SECRET: ${JWT_SECRET}
      DISABLE_PUBLIC_REGISTER: "true"
      FRMR_AUTO_INGEST: "true"
      FRMR_PREFER_LOCAL: "true"
      FRMR_OFFLINE_PATH: /app/local-data/FRMR.documentation.json
      INTEGRATION_API_KEY: ${INTEGRATION_API_KEY:-}
    volumes:
      - localdata:/app/local-data
      - evidence:/app/evidence
      - ./:/workspace

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
    depends_on:
      - api

  mcp:
    container_name: open-grc-mcp
    build:
      context: ./apps/mcp-server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MCP_WORKSPACE_ROOT: /workspace
      MCP_ALLOWED_PATHS: /workspace
      MCP_DATA_DIR: /app/data
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: "3334"
      MCP_HTTP_PATH: /mcp
      OPEN_GRC_API_URL: http://api:3000
      INTEGRATION_API_KEY: ${INTEGRATION_API_KEY:-}
      MCP_DRY_RUN_DEFAULT: "${MCP_DRY_RUN_DEFAULT:-false}"
      MCP_MAX_FILES_PER_RUN: "${MCP_MAX_FILES_PER_RUN:-25}"
      MCP_MAX_STEPS_PER_RUN: "${MCP_MAX_STEPS_PER_RUN:-60}"
      MCP_COMMAND_TIMEOUT_MS: "${MCP_COMMAND_TIMEOUT_MS:-120000}"
    volumes:
      - ./:/workspace
      - mcpdata:/app/data
    working_dir: /app
    depends_on:
      - api

volumes:
  localdata:
  evidence:
  mcpdata:
