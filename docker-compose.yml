# OpenGRC — single container: PostgreSQL + Nest API + Next.js (see root Dockerfile).
# This is the only supported Docker Compose stack.
# UI: http://localhost:8080  (Next.js proxies API via /api/* to the embedded API)
services:
  opengrc:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:3001"
    environment:
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-change-me}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@localhost}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      INTEGRATION_API_KEY: ${INTEGRATION_API_KEY:-}
      FRMR_AUTO_INGEST: ${FRMR_AUTO_INGEST:-}
      FRMR_PREFER_LOCAL: ${FRMR_PREFER_LOCAL:-}
      FRMR_OFFLINE_PATH: ${FRMR_OFFLINE_PATH:-}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
